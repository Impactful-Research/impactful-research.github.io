<!-- Language toggle (see assets/css/main.scss). Set the class on <html>
     synchronously in <head> so the page renders in the chosen language
     without a flash of the inactive one. -->
<script>
  (function () {
    try {
      var stored = localStorage.getItem('site-lang');
      var nav = (navigator.language || '').toLowerCase();
      var lang = stored || (nav.indexOf('zh') === 0 ? 'zh' : 'en');
      document.documentElement.classList.add('lang-' + lang);
    } catch (e) {
      document.documentElement.classList.add('lang-zh');
    }
  })();
  document.addEventListener('DOMContentLoaded', function () {
    var btn = document.querySelector('.lang-toggle');
    if (!btn) return;
    btn.addEventListener('click', function () {
      var h = document.documentElement;
      var next = h.classList.contains('lang-zh') ? 'en' : 'zh';
      h.classList.remove('lang-zh', 'lang-en');
      h.classList.add('lang-' + next);
      try { localStorage.setItem('site-lang', next); } catch (e) {}
    });
  });
</script>
